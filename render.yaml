services:
  - type: web
    name: ticketera-individual
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ticketera-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: true

databases:
  - name: ticketera-db
    databaseName: ticketera
    user: ticketera
