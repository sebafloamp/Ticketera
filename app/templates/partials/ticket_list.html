<ul class="ticket-list">
{% for ticket in tickets %}
    <li>
        <form method="post" action="/tickets/{{ ticket.id }}/move" style="display:inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="order" value="{{ ticket.order }}">
            <input type="hidden" name="redirect_to" value="/projects/{{ ticket.project_id }}/board?view=list">
            <select name="status" onchange="this.form.submit()">
                <option value="pendiente" {% if ticket.status == "pendiente" %}selected{% endif %}>pendiente</option>
                <option value="en_progreso" {% if ticket.status == "en_progreso" %}selected{% endif %}>en progreso</option>
                <option value="completado" {% if ticket.status == "completado" %}selected{% endif %}>completado</option>
            </select>
            {{ ticket.title }} ({{ ticket.priority }}{% if ticket.due_date %}, {{ ticket.due_date.strftime("%Y-%m-%d") }}{% endif %})
            {% if ticket.description %}<span style="font-size:12px;color:var(--ink-soft);">— {{ ticket.description }}</span>{% endif %}
        </form>
        <button type="button" class="ticket-edit delete-x task-edit" data-ticket-id="{{ ticket.id }}"
                data-ticket-description="{{ ticket.description }}" data-project-id="{{ ticket.project_id }}"
                title="Editar descripcion">&#9998;</button>
        <form method="post" action="/tickets/{{ ticket.id }}/delete" style="display:inline"
              onsubmit="return confirm('Eliminar el ticket {{ ticket.title }}?');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="redirect_to" value="/projects/{{ ticket.project_id }}">
            <button type="submit" class="delete-x" title="Eliminar ticket">&times;</button>
        </form>
    </li>
{% endfor %}
</ul>

<script>
(function () {
    var csrfTokenList = "{{ csrf_token }}";
    document.querySelectorAll(".ticket-edit").forEach(function (btn) {
        btn.addEventListener("click", function () {
            var current = btn.getAttribute("data-ticket-description") || "";
            var nueva = prompt("Descripcion breve (max 100 caracteres):", current);
            if (nueva === null) return;
            fetch("/tickets/" + btn.getAttribute("data-ticket-id") + "/edit", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "description=" + encodeURIComponent(nueva.slice(0, 100)) + "&csrf_token=" + encodeURIComponent(csrfTokenList),
            }).then(function () {
                location.reload();
            }).catch(function () {
                location.reload();
            });
        });
    });
})();
</script>
