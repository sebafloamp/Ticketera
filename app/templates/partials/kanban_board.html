<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
<div class="kanban">
{% for status in ["pendiente", "en_progreso", "completado"] %}
    <div class="kanban-column" data-status="{{ status }}">
        <h3>{{ status }}</h3>
        <div class="kanban-tasks" data-status="{{ status }}">
        {% for ticket in tickets if ticket.status == status %}
            <div class="kanban-task" data-task-id="{{ ticket.id }}">
                {{ ticket.title }}
                <span class="pct-num" style="text-transform:uppercase;font-size:11px;">{{ ticket.priority }}</span>
                {% if ticket.due_date %}<span style="font-size:11px;color:var(--ink-soft);">{{ ticket.due_date.strftime("%Y-%m-%d") }}</span>{% endif %}
            </div>
        {% endfor %}
        </div>
    </div>
{% endfor %}
</div>

<script>
document.querySelectorAll(".kanban-tasks").forEach(function (column) {
    new Sortable(column, {
        group: "kanban",
        animation: 150,
        onEnd: function (evt) {
            var ticketId = evt.item.getAttribute("data-task-id");
            var newStatus = evt.to.getAttribute("data-status");
            var order = evt.newIndex;
            var csrfToken = "{{ csrf_token }}";
            fetch("/tickets/" + ticketId + "/move", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "status=" + encodeURIComponent(newStatus) + "&order=" + order + "&csrf_token=" + encodeURIComponent(csrfToken),
            });
        },
    });
});
</script>
