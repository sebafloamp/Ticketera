{% extends "base.html" %}
{% block title %}Login - Ticketera Individual{% endblock %}
{% block content %}
<div class="wrap">
    <nav class="topnav">
        <a class="brand" href="/"><span class="dot"></span> Ticketera Individual</a>
    </nav>
</div>
<div class="auth-shell">
    <div class="auth-card card fade-up">
        <h1>Login</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post" action="/login" class="stack">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label>Email <input type="email" name="email" required></label>
            <label>Password <input type="password" name="password" required></label>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        <p class="auth-foot">No tenes cuenta? <a href="/register" style="color:var(--teal);">Crear cuenta</a></p>
    </div>
</div>
{% endblock %}
