name: Send weekly reminders

on:
  # Cron desactivado hasta configurar RESEND_API_KEY (Render) y REMINDER_TASK_TOKEN +
  # RENDER_APP_URL (secrets de este repo) -- sin eso, la corrida diaria falla siempre.
  # Para reactivar: descomentar el bloque "schedule" de abajo.
  # schedule:
  #   # 13:00 UTC ~ 09:00/10:00 Chile (depende de horario de verano). Ajustar si hace falta.
  #   - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        run: |
          response=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.REMINDER_TASK_TOKEN }}" \
            "${{ secrets.RENDER_APP_URL }}/internal/reminders/run")
          echo "HTTP status: $response"
          cat response.json
          if [ "$response" -ge 400 ]; then
            echo "Reminder trigger failed"
            exit 1
          fi
